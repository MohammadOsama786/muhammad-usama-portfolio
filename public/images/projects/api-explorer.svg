            <text x="0" y="44" fill="#6de7d4">{</text>
            <text x="25" y="44" fill="#51b7ff">"status"</text>
            <text x="119" y="44" fill="#9eb0c7">:</text>
            <text x="138" y="44" fill="#ffd166">"success"</text>
            <text x="0" y="82" fill="#6de7d4">}</text>

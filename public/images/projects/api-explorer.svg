<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="t d">
  <title id="t">REST API Explorer</title>
  <desc id="d">Retrofit • Coroutines • States • Pagination</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#06111f"/>
      <stop offset="0.58" stop-color="#0b1d32"/>
      <stop offset="1" stop-color="#0a1425"/>
